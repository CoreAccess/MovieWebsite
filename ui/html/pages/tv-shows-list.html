{{define "title"}}TV Shows{{end}}

{{define "main"}}

    <!-- Main Content Area -->
    <main class="py-4 py-lg-5 flex-grow-1">
                <!-- COLUMN 2: Results Area -->
                <div class="col-lg-12">
                    <div class="d-flex justify-content-between align-items-end border-bottom border-subtle pb-3 mb-4">
                        <div>
                            <h3 class="fw-bold mb-1">TV Shows</h3>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="small text-muted text-nowrap">Sort by:</label>
                            <select class="form-select form-select-sm bg-light border-0 shadow-none" style="width: auto;" onchange="window.location.href='?sort='+this.value">
                                <option value="popularity" {{if or (eq .Sort "popularity") (eq .Sort "")}}selected{{end}}>Popularity</option>
                                <option value="rating" {{if eq .Sort "rating"}}selected{{end}}>Rating</option>
                                <option value="date" {{if eq .Sort "date"}}selected{{end}}>Release Date</option>
                            </select>
                        </div>
                    </div>

                    <!-- Grid Results -->
                    <div class="row row-cols-2 row-cols-lg-4 row-cols-xl-6 row-cols-xxl-8 g-4 mb-5">
                        
                        <!-- TV Shows will go here -->

                        {{range .Shows}}
                        <!-- TV Result -->
                        <div class="col">
                            <a href="/tv-shows/{{.ID}}/{{.Slug}}" class="text-decoration-none">
                                <div class="media-card h-100 position-relative">
                                    <div class="position-absolute top-0 end-0 p-1 m-1 bg-dark bg-opacity-75 text-warning fw-bold rounded-1" style="font-size: 0.75rem; z-index: 2;"><i class="bi bi-star-fill me-1"></i>{{printf "%.1f" .AggregateRating}}</div>
                                    <div class="media-poster-container">
                                        <img src="{{.Image}}" alt="{{.Name}}" class="media-poster" style="object-fit: cover;">
                                    </div>
                                    <div class="p-3 bg-white">
                                        <h6 class="fw-bold text-dark text-truncate mb-1">{{.Name}}</h6>
                                    </div>
                                </div>
                            </a>
                        </div>
                        {{end}}

                    </div>
                </div>
    </main>

{{end}}
