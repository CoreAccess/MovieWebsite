{{define "title"}}{{with index .BlogPosts 0}}{{.Title}}{{end}}{{end}}

{{define "main"}}
<article class="container-xl py-5" style="max-width: 1600px;">
    {{range .BlogPosts}}
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <!-- Header Section -->
            <header class="mb-5 text-center">
                <div class="mb-3">
                    <span class="badge bg-primary text-white px-3 py-2" style="border-radius: 2px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px;">Editorial</span>
                </div>
                <h1 class="display-3 fw-black text-dark mb-4" style="letter-spacing: -2px; line-height: 1;">{{.Title}}</h1>
                <div class="d-flex align-items-center justify-content-center gap-3 text-muted">
                    <div class="d-flex align-items-center gap-2">
                        <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; font-size: 0.85rem; font-weight: 700;">
                            {{slice .Author 0 1}}
                        </div>
                        <span class="text-dark fw-bold">{{.Author}}</span>
                    </div>
                    <span>&bull;</span>
                    <time datetime="{{.CreatedAt.Format "2006-01-02"}}">{{.CreatedAt.Format "MMMM 02, 2006"}}</time>
                </div>
            </header>

            <!-- Hero Image -->
            {{if .Image}}
            <div class="mb-5 shadow-sm overflow-hidden" style="border-radius: 2px; border: 1px solid rgba(0,0,0,0.1);">
                <img src="{{.Image}}" class="w-100 object-fit-cover" style="max-height: 600px;" alt="{{.Title}}" fetchpriority="high">
            </div>
            {{end}}

            <!-- Content Section -->
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="blog-content pb-5 border-bottom mb-5" style="font-size: 1.15rem; line-height: 1.8; color: #333;">
                        {{.Content | safeHTML}}
                    </div>

                    <!-- Post Footer -->
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-dark btn-sm rounded-1 px-3" style="border-radius: 2px !important;"><i class="bi bi-hand-thumbs-up me-2"></i> Like</button>
                            <button class="btn btn-outline-dark btn-sm rounded-1 px-3" style="border-radius: 2px !important;"><i class="bi bi-share me-2"></i> Share</button>
                        </div>
                        <a href="/blog" class="text-decoration-none fw-bold">&larr; Back to Blog</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {{end}}
</article>

<style>
    .fw-black { font-weight: 900; }
    .blog-content h2 { font-weight: 800; margin-top: 2.5rem; margin-bottom: 1.25rem; letter-spacing: -1px; }
    .blog-content h3 { font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; }
    .blog-content p { margin-bottom: 1.5rem; }
    .blog-content ul, .blog-content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
    .blog-content li { margin-bottom: 0.5rem; }
    .blog-content blockquote { border-left: 4px solid #0d6efd; padding-left: 1.5rem; font-style: italic; color: #666; margin: 2rem 0; }
    .blog-content img { max-width: 100%; border-radius: 2px; margin: 2rem 0; border: 1px solid rgba(0,0,0,0.1); }
</style>
{{end}}
