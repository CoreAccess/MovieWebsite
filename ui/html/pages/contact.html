{{define "title"}}Contact Us{{end}}

{{define "main"}}
    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="text-center mb-5 pb-3 border-bottom border-subtle">
                        <span class="badge bg-subtle-primary text-primary-accent rounded-1 px-3 py-2 mb-3 fw-bold">Get In Touch</span>
                        <h1 class="display-4 fw-black text-dark mb-4">Contact StreamLine</h1>
                        <p class="lead text-muted">Have a question, feedback, or a partnership inquiry? We'd love to hear from you.</p>
                    </div>

                    <div class="bg-white p-4 p-md-5 rounded-1 shadow-sm mb-5 border border-subtle">
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label fw-bold small text-muted">First Name</label>
                                    <input type="text" class="form-control bg-light border-0 py-3" id="firstName" name="firstName" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label fw-bold small text-muted">Last Name</label>
                                    <input type="text" class="form-control bg-light border-0 py-3" id="lastName" name="lastName" required>
                                </div>
                                <div class="col-12">
                                    <label for="email" class="form-label fw-bold small text-muted">Email Address</label>
                                    <input type="email" class="form-control bg-light border-0 py-3" id="email" name="email" required>
                                </div>
                                <div class="col-12">
                                    <label for="subject" class="form-label fw-bold small text-muted">Subject</label>
                                    <select class="form-select bg-light border-0 py-3" id="subject" name="subject">
                                        <option value="general">General Inquiry</option>
                                        <option value="support">Technical Support</option>
                                        <option value="partnership">Partnerships / eBay Network</option>
                                        <option value="feedback">Feedback</option>
                                    </select>
                                </div>
                                <div class="col-12 border-bottom border-subtle pb-4 mb-2">
                                    <label for="message" class="form-label fw-bold small text-muted">Message</label>
                                    <textarea class="form-control bg-light border-0" rows="5" id="message" name="message" required></textarea>
                                </div>
                                <div class="col-12 mt-4 text-center">
                                    <button type="submit" class="btn btn-primary-accent rounded-1 px-5 py-3 fw-bold w-100 shadow-sm">Send Message</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="row text-center mt-5">
                        <div class="col-md-4 mb-4">
                            <i class="bi bi-geo-alt fs-2 text-primary-accent mb-2"></i>
                            <h6 class="fw-bold">Headquarters</h6>
                            <p class="text-muted small">123 Cinema Blvd<br>Los Angeles, CA 90028</p>
                        </div>
                        <div class="col-md-4 mb-4">
                            <i class="bi bi-envelope fs-2 text-primary-accent mb-2"></i>
                            <h6 class="fw-bold">Email Us</h6>
                            <p class="text-muted small">hello@streamline.app</p>
                        </div>
                        <div class="col-md-4 mb-4">
                            <i class="bi bi-telephone fs-2 text-primary-accent mb-2"></i>
                            <h6 class="fw-bold">Call Us</h6>
                            <p class="text-muted small">+1 (555) 123-4567</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

{{end}}
