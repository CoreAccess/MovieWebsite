{{define "title"}}Contact Us{{end}}

{{define "main"}}
    <div class="container-1600 mx-auto py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="text-center mb-5">
                    <span class="badge bg-primary rounded-1 px-3 py-2 mb-3 fw-bold">Get In Touch</span>
                    <h1 class="display-4 fw-bold text-dark mb-4">Contact FilmGap</h1>
                    <p class="lead text-secondary">Have a question or feedback? We'd love to hear from you.</p>
                </div>

                <div class="bg-white p-4 p-md-5 rounded-1 border border-subtle mb-5">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">First Name</label>
                                <input type="text" class="form-control border-subtle py-3 rounded-1" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Last Name</label>
                                <input type="text" class="form-control border-subtle py-3 rounded-1" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold small text-muted">Email Address</label>
                                <input type="email" class="form-control border-subtle py-3 rounded-1" required>
                            </div>
                            <div class="col-12 border-bottom border-subtle pb-4 mb-2">
                                <label class="form-label fw-bold small text-muted">Message</label>
                                <textarea class="form-control border-subtle rounded-1" rows="5" required></textarea>
                            </div>
                            <div class="col-12 mt-4 text-center">
                                <button type="submit" class="btn btn-primary rounded-1 px-5 py-3 fw-bold w-100">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="row text-center mt-5">
                    <div class="col-md-6 mb-4">
                        <i class="bi bi-envelope fs-2 text-primary mb-2"></i>
                        <h6 class="fw-bold">Email Us</h6>
                        <p class="text-secondary small">hello@filmgap.com</p>
                    </div>
                    <div class="col-md-6 mb-4">
                        <i class="bi bi-terminal fs-2 text-primary mb-2"></i>
                        <h6 class="fw-bold">API Support</h6>
                        <p class="text-secondary small">api@filmgap.com</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

{{end}}
