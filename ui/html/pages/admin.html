{{define "main"}}
    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-subtle">
            <div>
                <h2 class="fw-bold mb-1 text-dark"><i class="bi bi-shield-lock-fill text-danger me-2"></i>Administration</h2>
                <p class="text-muted small mb-0">System overview and moderation tools.</p>
            </div>
        </div>
        
        <div class="row g-4 mb-4">
            <!-- Metrics Cards -->
            <div class="col-md-3">
                <div class="card border-0 shadow-sm rounded-1 bg-white">
                    <div class="card-body p-4 text-center">
                        <i class="bi bi-people-fill text-primary fs-1 mb-2"></i>
                        <h3 class="fw-black mb-0">{{.UserCount}}</h3>
                        <p class="text-muted small fw-bold text-uppercase mb-0 mt-1" style="letter-spacing: 1px;">Total Users</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm rounded-1 bg-white">
                    <div class="card-body p-4 text-center">
                        <i class="bi bi-film text-success fs-1 mb-2"></i>
                        <h3 class="fw-black mb-0">{{.MediaCount}}</h3>
                        <p class="text-muted small fw-bold text-uppercase mb-0 mt-1" style="letter-spacing: 1px;">Media Assets</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
{{end}}
